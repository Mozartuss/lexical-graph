services:
  db:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: Wordnet
    ports:
      - 27017:27017

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: ["sh", "-c", "npm install && npm run dev"]
    volumes:
      - ./server:/usr/src/app
    environment:
      DO_IMPORT_WORDNET: 0
      MONGO_URI: mongodb://db:27017/Wordnet
      NODE_ENV: development
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    volumes:
      - ./client:/usr/src/app
    environment:
      VITE_API_PROXY_TARGET: http://server:8080
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - server

volumes:
  mongo_data: